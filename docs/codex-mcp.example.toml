# First install the MCP extra into this clone's virtual environment:
# .\.venv\Scripts\python.exe -m pip install -e ".[mcp]"
# Then copy this block into Codex config.toml, replace the placeholder paths,
# and restart Codex so the MCP process is recreated with the new configuration.

[mcp_servers.agent_control_plane]
command = "C:\\path\\to\\agent-control-plane\\.venv\\Scripts\\python.exe"
args = [
  "-m",
  "agent_control_plane.app.runtime.mcp_server",
  "--config",
  "C:\\path\\to\\agent-control-plane\\config\\workspaces.toml",
]
cwd = "C:\\path\\to\\agent-control-plane"
enabled = true
required = false
startup_timeout_sec = 60
# Keep this above the default 25-second watch/plan-watch window.
tool_timeout_sec = 90
