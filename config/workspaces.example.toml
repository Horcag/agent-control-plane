# Copy this file to config/workspaces.toml and edit the paths for your machine.
# All relative paths are resolved from the repository root, not from this file.
# Keep slots and generated worktrees next to this repository, not inside it.

[control]
coordination_root = ".agent-work"
runs_root = "runs"
database = "runs/jobs.sqlite3"
worktree_root = "../agent-control-plane-worktrees"
worktree_base = "../my-project"
slot_root = "../agent-control-plane-slots"
agy_command = "agy"
codex_command = "codex"

[control.defaults]
timeout_sec = 3600
idle_timeout_sec = 900
print_timeout = "60m"
max_restarts = 0
yolo = false
allow_dirty = false
runs_layout = "date"
auto_archive_days = 14
auto_archive_limit = 200
backend = "codex"
# Optional default Antigravity model. Override per route or with --agy-model.
agy_model = "Gemini 3.5 Flash (High)"
codex_model = "gpt-5.6-terra"
codex_reasoning_effort = "medium"
codex_sandbox_mode = "workspace-write"
# Backward-compatible default. Use "native" to run Codex without AgentBridge/IDEA.
workspace_access = "ide_mcp"
# "worker" requires successful checks in verification.json. "controller" also
# reruns route-specific gates against the checkpoint. "off" disables route-specific gates.
native_quality_policy = "worker"
# "preserve" leaves terminal changes in a dirty slot. "checkpoint" first stores
# them in a controller-owned Git ref and review inbox, then cleans and releases the slot.
terminal_slot_policy = "checkpoint"
codex_disabled_mcp_servers = []
codex_no_progress_timeout_sec = 600
# Keep deep as the default until review/rework telemetry proves a cheaper tier is net-positive.
# Use mechanical only for bounded edits with strong automated acceptance checks.
codex_quality_tier = "deep"
codex_mechanical_model = "gpt-5.6-luna"
codex_mechanical_reasoning_effort = "low"
codex_balanced_model = "gpt-5.6-terra"
codex_balanced_reasoning_effort = "medium"
codex_deep_model = "gpt-5.6-terra"
codex_deep_reasoning_effort = "medium"
codex_mechanical_tool_call_budget = 45
codex_balanced_tool_call_budget = 80
codex_deep_tool_call_budget = 120
codex_global_quota_database = "${USERPROFILE}/.codex/agent-control-plane/global-quota.sqlite3"
codex_global_max_concurrent_jobs = 2
codex_global_max_burst_jobs = 8
# Legacy compatibility settings. New configurations should declare quota domains and
# model mappings below under [control.model_catalog]; ACP translates these settings
# into the legacy primary/spark catalog only when that table is absent.
codex_spark_max_concurrent_jobs = 8
# Legacy option name for the primary-domain reported rate-limit window.
# The primary-domain window may be longer than five hours.
codex_five_hour_soft_limit_percent = 75
# Optional separate Spark quota-window threshold. Set to 100 to defer Spark while
# reported usage remains 100 and reset is still in the future.
codex_spark_soft_limit_percent = 100
codex_spark_models = ["gpt-5.3-codex-spark"]
codex_quota_poll_sec = 30
codex_sessions_root = "${USERPROFILE}/.codex/sessions"
guardrail_poll_sec = 2
prepare_slots = true
auto_switch_agy_on_quota = false
auto_switch_agy_strategy = "best"
auto_switch_agy_electron_command = ["cmd", "/c", "npx", "--no-install", "electron"]
forbidden_status_globs = [
  "uv.lock",
  "poetry.lock",
  "package-lock.json",
  "pnpm-lock.yaml",
  "yarn.lock",
  "bun.lock",
  "bun.lockb",
  ".venv/**",
]

# Codex's local cache owns the live inventory: visibility, priority, and supported
# reasoning efforts. This path may be overridden for a controlled runtime or test.
# A missing, invalid, or stale cache prevents automatic quality-tier routing, but an
# explicit --codex-model stays launchable (with full conservative quota weight when
# its metadata is unknown).
[control.model_catalog]
cache_path = "${USERPROFILE}/.codex/models_cache.json"
max_cache_age_sec = 86400

# Quota domains are independent capacity and provider-rate-limit pools. "spark" is
# only an example name; define any additional domain needed by the configured models.
[[control.model_catalog.quota_domains]]
name = "primary"
max_concurrent_jobs = 2
max_burst_jobs = 8
soft_limit_percent = 75

[[control.model_catalog.quota_domains]]
name = "spark"
max_concurrent_jobs = 8
max_burst_jobs = 32
soft_limit_percent = 100

# Metadata overlays supplement, rather than replace, cache inventory. Omit a rate
# card when it is not authoritative: telemetry will retain raw usage and report null
# estimates. Every supplied price is per million tokens and needs a version and source.
[[control.model_catalog.models]]
model = "gpt-5.6-luna"
quota_domain = "primary"
capacity_units = { none = 2, low = 2, medium = 4, high = 6, xhigh = 6 }
credit_rate = { input = 25.0, cached_input = 2.5, output = 150.0 }
api_usd_rate = { input = 1.0, cached_input = 0.1, output = 6.0 }
rate_card_version = "2026-07-09"
rate_card_source = "operator-verified Codex and API rate cards"

[[control.model_catalog.models]]
model = "gpt-5.6-terra"
quota_domain = "primary"
capacity_units = { none = 5, low = 5, medium = 10, high = 15, xhigh = 15 }
credit_rate = { input = 62.5, cached_input = 6.25, output = 375.0 }
api_usd_rate = { input = 2.5, cached_input = 0.25, output = 15.0 }
rate_card_version = "2026-07-09"
rate_card_source = "operator-verified Codex and API rate cards"

[[control.model_catalog.models]]
model = "gpt-5.6-sol"
quota_domain = "primary"
capacity_units = { none = 10, low = 10, medium = 20, high = 30, xhigh = 30, max = 30 }
credit_rate = { input = 125.0, cached_input = 12.5, output = 750.0 }
api_usd_rate = { input = 5.0, cached_input = 0.5, output = 30.0 }
rate_card_version = "2026-07-09"
rate_card_source = "operator-verified Codex and API rate cards"

[[control.model_catalog.models]]
model = "gpt-5.3-codex-spark"
quota_domain = "spark"

[routes.app]
path = "../my-project"
required_branch = "main"
# Optional route override: "ide_mcp" or "native". A per-job override has priority.
# workspace_access = "native"
# Use a stable AgentBridge IDE/port ID from ~/.codex/config.toml.
ide_mcp_server = "agentbridge_idea_8644"
# Optional: MCP server name from Antigravity User/mcp.json. Configure an
# AgentBridge server for AGY jobs that edit external managed slots; otherwise
# the legacy native `idea` contract remains the default.
agy_mcp_server = "agentbridge-ide"
# Optional route-specific Antigravity model.
agy_model = "Gemini 3.5 Flash (High)"
# This is the root returned by the selected server's get_project_info call.
ide_mcp_project_root = "../my-project"
worktree_root = "../agent-control-plane-worktrees"
worktree_base = "../my-project"
source_roots = ["."]
test_roots = ["tests"]
exclude_dirs = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "build",
  "dist",
  "node_modules",
]
codex_forbidden_tool_markers = []

# Optional strict native-mode contract. Controller mode requires checkpointed slot jobs.
# Gate commands run without a shell, must already be installed in the prepared slot,
# and should be read-only checks. Empty include_globs means every changed file.
# native_quality_policy = "controller"
# native_quality_max_parallel = 2
# [[routes.app.native_quality_gates]]
# name = "affected-tests"
# command = ["python", "scripts/run_affected_tests.py", "--worktree"]
# working_dir = "."
# timeout_sec = 1200
# include_globs = []
# run_on = "controller"
# [[routes.app.native_quality_gates]]
# name = "ruff-changed"
# command = ["python", "-m", "ruff", "check", "{changed_python_files}"]
# working_dir = "."
# timeout_sec = 300
# include_globs = ["*.py", "**/*.py"]
# run_on = "both"

[slots."app-1"]
route = "app"
path = "../agent-control-plane-slots/app-1"
