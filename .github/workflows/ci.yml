name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,mcp]"
      - name: Ruff
        run: python -m ruff check src tests scripts
      - name: Ruff format
        run: python -m ruff format --check src tests scripts
      - name: Mypy (Linux and Windows)
        run: |
          python -m mypy --platform linux src scripts/run_affected_tests.py
          python -m mypy --platform win32 src scripts/run_affected_tests.py
      - name: Bandit
        run: python -m bandit -q -c pyproject.toml -r src scripts

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,mcp]"
      - name: Affected tests
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/run_affected_tests.py
          --base "${{ github.event.pull_request.base.sha }}"
          --head HEAD
      - name: Full tests
        if: github.event_name != 'pull_request'
        run: python -m pytest
